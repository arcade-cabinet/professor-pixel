name: CD-Mobile

# Builds the Capacitor Android APK on every push to main and uploads it as a
# workflow artifact for QA download. Signed Play Store builds run only via
# manual workflow_dispatch and consume the ANDROID_KEYSTORE_* secrets.
#
# iOS builds are deliberately NOT in this workflow — Apple's signing model
# doesn't fit GitHub-hosted runners cleanly. iOS is a manual Mac+Xcode flow
# (see docs/DEPLOYMENT.md → iOS workflow).

on:
  push:
    branches: ['main']
    paths:
      - 'app/**'
      - 'src/**'
      - 'public/**'
      - 'capacitor.config.ts'
      - 'android/**'
      - '!android/build/**'
      - '!android/.gradle/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/cd-mobile.yml'
  workflow_dispatch:
    inputs:
      release:
        description: 'Build a signed release APK (requires ANDROID_KEYSTORE_* secrets)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  android-debug:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: professor-pixel-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
          if-no-files-found: error

  android-release:
    name: Build signed Android release APK
    # Trusted-ref guard: signed releases only run from main or tagged refs.
    # Without this, an attacker (or accidental triggerer) could pick any
    # branch from the workflow_dispatch UI and cut a signed APK whose code
    # never went through main's branch protection.
    if: >-
      github.event_name == 'workflow_dispatch'
      && inputs.release
      && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: android-release
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need history so the reachability check below can resolve
          # `origin/main` and run `merge-base --is-ancestor`. The default
          # shallow checkout doesn't pull main.
          fetch-depth: 0

      # Defense in depth on top of the trusted-ref guard. The `if:` above
      # restricts to refs/heads/main or refs/tags/*, but tag protection
      # doesn't inherit branch protection — anyone with `contents: write`
      # could tag a feature branch tip and trigger a signed release from
      # un-reviewed code. This step refuses to proceed unless the chosen
      # SHA is reachable from origin/main, so signing only ever runs
      # against code that landed via main's review/merge process.
      - name: Verify ref is reachable from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Refusing to sign: $GITHUB_SHA not reachable from origin/main"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web bundle
        run: pnpm build

      - name: Sync Capacitor Android
        run: npx cap sync android

      # Decode the keystore + write signing.properties RIGHT BEFORE
      # assembleRelease, not earlier. Sequencing matters: the secrets only
      # live on disk for the duration of the gradle build, minimizing the
      # blast radius if a downstream step (npm, Capacitor sync, etc.) gets
      # compromised and starts exfiltrating files. Keep this block paired
      # with the Assemble step.
      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/keystore/release.keystore

      - name: Write signing.properties
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cat > android/app/signing.properties <<EOF
          storeFile=keystore/release.keystore
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Assemble release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      # Wipe signing material as soon as Gradle returns, even on failure.
      # Runners are ephemeral so the practical blast radius is bounded,
      # but explicit cleanup makes the intent clear and survives any
      # future change that uploads `android/**` for diagnostics.
      - name: Wipe signing material
        if: always()
        run: |
          shred -u android/app/keystore/release.keystore 2>/dev/null \
            || rm -f android/app/keystore/release.keystore
          shred -u android/app/signing.properties 2>/dev/null \
            || rm -f android/app/signing.properties

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: professor-pixel-release-${{ github.sha }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90
          if-no-files-found: error
