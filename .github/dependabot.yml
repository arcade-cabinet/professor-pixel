version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: scope
    labels:
      - dependencies
      - npm
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      security:
        applies-to: security-updates
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/New_York"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
      include: scope
    labels:
      - dependencies
      - github-actions
    groups:
      minor-and-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
