apply plugin: 'com.android.application'

// Load signing.properties if present. The file is gitignored — CI writes it
// just before assembleRelease, and devs only need it locally if they want to
// build a real signed APK. assembleDebug never reads this and works with the
// default debug keystore even when signing.properties is missing.
def signingPropsFile = rootProject.file("app/signing.properties")
def signingProps = new Properties()
if (signingPropsFile.exists()) {
    signingPropsFile.withInputStream { signingProps.load(it) }
}

android {
    namespace = "com.arcadecabinet.professorpixel"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.arcadecabinet.professorpixel"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // VERSION_CODE / VERSION_NAME come from gradle.properties or `-P` CLI flags
        // in CI so release builds can increment without editing this file. Defaults
        // here keep `gradlew assembleDebug` working from a clean checkout.
        versionCode Integer.parseInt(project.findProperty("VERSION_CODE") ?: "1")
        versionName project.findProperty("VERSION_NAME") ?: "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        // Only register a release signingConfig when signing.properties is on
        // disk. If a dev runs `gradlew assembleRelease` without supplying
        // signing.properties, gradle emits an unsigned APK with a warning —
        // not ideal, but better than reading from a non-existent file and
        // failing the entire configuration phase (which would also break
        // assembleDebug). CI guarantees the file is present via its
        // "Write signing.properties" step before assembleRelease.
        if (signingPropsFile.exists()) {
            release {
                storeFile rootProject.file("app/${signingProps['storeFile']}")
                storePassword signingProps['storePassword']
                keyAlias signingProps['keyAlias']
                keyPassword signingProps['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (signingPropsFile.exists()) {
                signingConfig signingConfigs.release
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
