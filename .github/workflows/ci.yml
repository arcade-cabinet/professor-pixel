name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type check + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Build full application
        run: npm run build
        env:
          NODE_ENV: production

  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Advisory until the codebase is brought into a clean state.
      # Tracked in docs/STATE.md ("Standards alignment").
      - name: ESLint
        run: npx eslint .
        continue-on-error: true

      - name: Prettier
        run: npx prettier --check .
        continue-on-error: true
