name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type check + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      - name: Build full application
        run: pnpm build
        env:
          NODE_ENV: production

  lint:
    name: Biome (blocking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (lint + format)
        run: pnpm lint

  test:
    name: Vitest (unit + integration + component)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build asset catalog
        run: pnpm catalog

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run integration tests
        run: pnpm test:integration

      - name: Run component tests (Vitest browser)
        run: pnpm test:component

  e2e-production-shape:
    # E1 + E2 of the experience-polish pillar — real e2e against a
    # production-shape build (vite build --base=/professor-pixel/ +
    # vite preview), not the dev server. Catches deploy-chain BASE_URL
    # bugs, asserts cold-start budget, and runs the visual baseline
    # diff for home / lessons / not-found across desktop/tablet/mobile.
    name: Playwright (production-shape build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium + WebKit
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Build asset catalog
        run: pnpm catalog

      - name: Run production-shape Playwright suite
        run: |
          pnpm exec playwright test \
            --project=production-shape-desktop \
            --project=production-shape-tablet \
            --project=production-shape-mobile

      # E2.3 — Upload visual diffs + traces on failure so reviewers can
      # see what changed. Successful runs skip this (artifacts only on
      # failure keeps storage costs bounded).
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-production-shape-${{ github.sha }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14
          if-no-files-found: ignore
